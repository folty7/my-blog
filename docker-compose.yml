services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: blog-admin
      POSTGRES_PASSWORD: blog-admin-password
      POSTGRES_DB: blog_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U blog-admin -d blog_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: always
    ports:
      - "3000:8081"
    environment:
      DATABASE_URL: postgresql://blog-admin:blog-admin-password@postgres:5432/blog_db
      NODE_ENV: production
      PORT: 8081
      JWT_SECRET: my-super-secret-local-jwt-key-for-testing
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/dist/public/uploads

volumes:
  postgres_data:
  uploads_data:
